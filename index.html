      width: 14px; height: 14px; border-radius: 50%;
      border: 1.5px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,.4);
      cursor: pointer;
    }
     
    .pin-star {
      display: block; cursor: pointer;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.4));
    }

     
    .pin-installed {
      width: 10px; height: 10px;
      background: #fff;
      border: 1px solid #222;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,.2);
      cursor: pointer;
    }

     
    .install-detail {
      background: #e6f4ea; border-radius: 8px;
      padding: 12px 14px; margin: 10px 0 14px;
    }
    .install-detail-title {
      font-size: 14px; font-weight: 700; color: #1e8e3e;
      margin-bottom: 8px;
    }
    .install-detail dl {
      display: grid; grid-template-columns: 80px 1fr; gap: 4px 10px;
      font-size: 13px; margin: 0;
    }
    .install-detail dt { color: #1e8e3e; opacity: .75; }
    .install-detail dd { color: #1e8e3e; font-weight: 500; margin: 0; }

     
    .pin-label {
      display: flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
      background: #fff; border: 1.5px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,.4);
      font-size: 14px; line-height: 1; cursor: pointer;
    }
    .pin-label.npay {
      background: #03c75a; color: #fff;
      font-size: 12px; font-weight: 800;
      border-radius: 4px;
      font-family: -apple-system, "SF Pro", sans-serif;
      letter-spacing: -0.5px;
    }
     
    .leaflet-popup-content .naver-popup { min-width: 180px; }
    .naver-popup-name { font-size: 14px; font-weight: 700; }
    .naver-popup-cat { font-size: 12px; color: #1a73e8; margin-top: 2px; }
    .naver-popup-addr { font-size: 12px; color: #666; margin-top: 6px; line-height: 1.4; }
    .naver-popup-link {
      display: inline-block; margin-top: 10px;
      background: #03c75a; color: #fff !important; text-decoration: none;
      padding: 6px 12px; border-radius: 4px;
      font-size: 12px; font-weight: 600;
    }
    .pin-badge {
      position: absolute; top: -8px; right: -10px;
      background: #fff; color: #333;
      font-size: 10px; font-weight: 700;
      padding: 0 4px; border-radius: 9px;
      border: 1px solid #999;
      min-width: 14px; text-align: center;
      line-height: 14px; height: 14px;
      pointer-events: none;
    }

     
    .search-wrap { position: relative; }
    #search {
      width: 100%; padding: 8px 30px 8px 12px; font-size: 14px;
      border: 1px solid #ddd; border-radius: 8px; background: #fff; outline: none;
    }
    #search:focus { border-color: #1a73e8; }
    #search-clear {
      position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #888; font-size: 14px; cursor: pointer;
      padding: 4px 8px;
    }
    #search-results {
      position: absolute; left: 10px; right: 10px; top: 100%;
      margin-top: 4px; max-height: 50vh; overflow-y: auto;
      border: 1px solid #ddd; border-radius: 8px; background: #fff;
      box-shadow: 0 4px 12px rgba(0,0,0,.15); z-index: 1001;
    }
    .search-result {
      padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #f4f4f4;
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: #f6f8fc; }
    .search-result .name { font-size: 14px; font-weight: 600; }
    .search-result .addr { font-size: 12px; color: #777; margin-top: 2px; }
    .search-empty { padding: 12px; text-align: center; color: #999; font-size: 13px; }
    .search-section-label {
      padding: 6px 12px; font-size: 11px; color: #888; font-weight: 600;
      background: #fafafa; border-bottom: 1px solid #f0f0f0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .search-section-label .loading-text { color: #aaa; font-weight: 400; font-size: 10px; }
    .search-result.addr-result .name { font-weight: 500; color: #333; }
    .search-result.addr-result::before { content: "📍 "; }
    #search-results.hidden, #search-clear.hidden { display: none; }

     
    .sheet-empty {
      padding: 28px 16px; text-align: center; color: #666; font-size: 14px;
      background: #f6f8fc; border-radius: 8px; margin-top: 12px; line-height: 1.5;
    }
    .sheet-empty .sub { color: #999; font-size: 12px; margin-top: 4px; }

     
    #locate-btn {
      position: fixed; bottom: 24px; right: 16px; z-index: 1100;
      width: 48px; height: 48px; border-radius: 50%;
      background: #fff; border: 1px solid #ddd; color: #1a73e8;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform .1s;
    }
    #locate-btn:active { transform: scale(0.92); }
    #locate-btn.loading { opacity: 0.5; pointer-events: none; }
    #locate-btn.loading svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

     
    .bottom-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; margin-top: 2px;
    }
    .toggle-group {
      display: flex; gap: 6px; flex-wrap: wrap; flex: 1; min-width: 0;
    }
     
    .chip-toggle {
      background: #fff; border: 1px solid #ddd;
      padding: 6px 12px; border-radius: 16px;
      font-size: 12px; font-weight: 600; color: #555;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform .1s, background .15s, color .15s;
      white-space: nowrap;
    }
    .chip-toggle:active { transform: scale(0.95); }
    .chip-toggle.active {
      background: #1a73e8; color: #fff; border-color: #1a73e8;
    }

     
    .locate-tooltip {
      background: #1a73e8; color: #fff; border: none;
      padding: 4px 10px; border-radius: 6px; font-size: 12px;
      font-weight: 600; box-shadow: 0 2px 4px rgba(0,0,0,.2);
    }
    .locate-tooltip::before { border-top-color: #1a73e8 !important; }

     
    #sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 1500;
      opacity: 1; transition: opacity .2s;
    }
    #sheet-backdrop.hidden { opacity: 0; pointer-events: none; }
    #sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 2000;
      background: #fff; border-radius: 16px 16px 0 0;
      box-shadow: 0 -2px 16px rgba(0,0,0,.2);
      max-height: 70vh; overflow-y: auto; padding: 16px 18px 28px;
      transform: translateY(0); transition: transform .25s ease;
    }
    #sheet.hidden { transform: translateY(100%); }
    .sheet-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 12px; }
    #sheet-close {
      position: absolute; top: 14px; right: 14px; background: none; border: none;
      font-size: 22px; line-height: 1; cursor: pointer; color: #888; padding: 4px 8px;
    }
    .sheet-title { font-size: 18px; font-weight: 700; padding-right: 32px; }
    .sheet-addr { font-size: 13px; color: #777; margin: 4px 0 2px; }
    .sheet-biz {
      font-size: 12px; color: #888; margin-bottom: 12px;
      font-variant-numeric: tabular-nums; user-select: all;
    }
    .attempts { margin-top: 4px; }
    .attempt {
      border-top: 1px solid #eee; padding: 12px 0; display: flex; gap: 12px;
    }
    .attempt:first-child { border-top: none; padding-top: 4px; }
    .attempt-date {
      flex-shrink: 0; min-width: 78px; font-size: 13px; color: #555; font-variant-numeric: tabular-nums;
    }
    .attempt-body { flex: 1; min-width: 0; }
    .attempt-rep { font-weight: 600; font-size: 14px; }
    .attempt-agency {
      font-size: 13px; color: #444; margin-top: 3px;
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    }
    .attempt-agency .tel {
      color: #1a73e8; text-decoration: none; font-weight: 500;
      padding: 2px 6px; border: 1px solid #d8e3f5; border-radius: 4px;
      background: #f6f9ff;
    }
    .attempt-agency .tel:active { background: #e8f0fe; }
    .attempt-meta {
      display: flex; gap: 6px; flex-wrap: wrap; font-size: 12px; color: #555; margin-top: 4px;
    }
    .badge {
      background: #eef; color: #1a73e8; padding: 2px 7px; border-radius: 4px; font-weight: 500;
    }
    .badge.green { background: #e6f4ea; color: #1e8e3e; }
    .badge.red { background: #fce8e6; color: #d93025; }
    .attempt-note {
      font-size: 13px; color: #333; margin-top: 6px; line-height: 1.45;
      white-space: pre-wrap; word-break: break-word;
    }


    #data-loader {
      position: fixed; inset: 0; z-index: 3000;
      display: flex; align-items: center; justify-content: center;
      padding: 18px; background: #f7f8fa;
    }
    #data-loader.hidden { display: none; }
    .data-panel {
      width: min(360px, 100%); background: #fff; border: 1px solid #dfe3e8;
      border-radius: 10px; box-shadow: 0 14px 36px rgba(0,0,0,.12);
      padding: 18px; display: flex; flex-direction: column; gap: 14px;
    }
    .data-title { font-size: 18px; font-weight: 700; }
    #data-password {
      width: 100%; border: 1px solid #d0d5dd; border-radius: 8px;
      padding: 10px 12px; font-size: 15px; outline: none;
    }
    #data-password:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,.12); }
    .data-actions { display: flex; flex-direction: column; align-items: stretch; gap: 10px; }
    #data-load {
      border: 0; border-radius: 8px; padding: 10px 18px;
      font-weight: 700; cursor: pointer;
    }
    #data-load { background: #1a73e8; color: #fff; }
    #data-load:disabled { opacity: .55; cursor: default; }
    #data-status { color: #666; font-size: 13px; min-height: 18px; }

    @media (max-width: 600px) {
      #topbar {
        padding: calc(10px + env(safe-area-inset-top)) 10px 8px;
        gap: 8px;
      }
      .mode-tab { padding: 8px 4px; font-size: 13px; }
      .filters select {
        flex: 1 1 calc(50% - 3px);
        padding: 8px 26px 8px 8px;
        font-size: 12px;
      }
      .filters select:nth-child(3) { flex-basis: 100%; }
      .bottom-row { align-items: flex-start; }
      .chip-toggle { padding: 6px 9px; font-size: 11px; }
      .leaflet-top { top: 250px; }
      #locate-btn {
        right: 12px;
        bottom: calc(18px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <header id="topbar">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="history" type="button">📋 영업 히스토리</button>
      <button class="mode-tab" data-mode="target" type="button">🎯 타깃 발굴</button>
    </div>
    <div class="filters">
      <select id="filter-rep" class="filter-history"><option value="">영업사원 전체</option></select>
      <select id="filter-region" class="filter-history"><option value="">지역 전체</option></select>
      <select id="filter-persuaded" class="filter-history"><option value="">설득 전체</option></select>
      <select id="filter-label" class="filter-target"><option value="">뱃지 종류 전체</option></select>
    </div>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="매장명 또는 주소 검색..." autocomplete="off" />
      <button id="search-clear" class="hidden" aria-label="지우기">✕</button>
      <div id="search-results" class="hidden"></div>
    </div>
    <div class="bottom-row">
      <div class="toggle-group">
        <button id="installed-toggle" class="chip-toggle chip-history-only" type="button">★ 설치 매장</button>
        <button id="agency-daewon" class="chip-toggle chip-history-only" type="button">대원하이텍</button>
        <button id="merchants-toggle" class="chip-toggle active" type="button">⚪ 기설치 매장</button>
      </div>
      <div class="count" id="count"></div>
    </div>
  </header>
  <div id="map"></div>

  
  <button id="locate-btn" aria-label="현위치 보기">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
      <line x1="12" y1="2" x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="5" y2="12"/>
      <line x1="19" y1="12" x2="22" y2="12"/>
      <circle cx="12" cy="12" r="9"/>
    </svg>
  </button>

  
  <div id="sheet-backdrop" class="hidden"></div>
  <div id="sheet" class="hidden">
    <div class="sheet-handle"></div>
    <button id="sheet-close" aria-label="닫기">✕</button>
    <div id="sheet-body"></div>
  </div>

    <div id="data-loader" role="dialog" aria-modal="true">
    <div class="data-panel">
      <div class="data-title">데이터 불러오기</div>
      <input id="data-password" type="password" autocomplete="current-password" placeholder="비밀번호">
      <div class="data-actions">
        <button id="data-load" type="button">불러오기</button>
        <div id="data-status" aria-live="polite"></div>
      </div>
    </div>
  </div>

    function objectFromRow(keys, row) {
      const out = {};
      keys.forEach((key, i) => { out[key] = row[i] || ""; });
      return out;
    }
    function unpackMatched(row) {
      if (!row) return null;
      return { isInstalled: !!row[0], store: row[1] || "", color: row[2] || "", historyId: row[3] || "" };
    }
    function unpackData(packed) {
      if (!packed || packed.v !== 1) throw new Error("지원하지 않는 데이터 형식입니다.");
      return {
        count: (packed.l || []).length,
        facets: packed.f || {},
        locations: (packed.l || []).map(row => ({
          id: row[0] || "", store: row[1] || "", region: row[2] || "", address: row[3] || "", bizNumber: row[4] || "",
          lat: unscale(row[5]), lng: unscale(row[6]), color: row[7] || "blue",
          attempts: (row[8] || []).map(a => objectFromRow(ATTEMPT_KEYS, a))
        })),
        naverLocations: (packed.n || []).map(row => ({
          address: row[0] || "", sigungu: row[1] || "", lng: unscale(row[2]), sido: row[3] || "", name: row[4] || "",
          dong: row[5] || "", category: row[6] || "", lat: unscale(row[7]), labels: row[8] || "", matched: unpackMatched(row[9])
        })),
        installedMerchants: (packed.i || []).map(row => ({
          address: row[0] || "", lng: unscale(row[1]), installedDate: row[2] || "", name: row[3] || "", id: row[4] || "", type: row[5] || "", lat: unscale(row[6])
        }))
      };
    }
    function extractPayload(input) {
      let text = String(input || "").trim();
      try {
        const url = new URL(text);
        text = url.searchParams.get("d") || new URLSearchParams(url.hash.replace(/^#/, "")).get("d") || text;
      } catch (_) {}
      const matched = text.match(/[?#&]d=([^&\s]+)/);
      if (matched) text = decodeURIComponent(matched[1]);
      if (text.startsWith("d=")) text = text.slice(2);
      return text.replace(/\s+/g, "");
    }
    function base64ToBytes(input) {
      let base64 = extractPayload(input).replace(/-/g, "+").replace(/_/g, "/");
      if (!base64) throw new Error("데이터가 비어 있습니다.");
      base64 += "=".repeat((4 - base64.length % 4) % 4);
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }
    const ENCRYPTED_MAGIC = "TS2E1";
    const ENCRYPTED_SALT_BYTES = 16;
    const ENCRYPTED_IV_BYTES = 12;
    const ENCRYPTED_PBKDF2_ITERATIONS = 210000;
    async function decryptPayload(input, password) {
      if (!window.crypto || !crypto.subtle) throw new Error("복호화를 사용할 수 없는 브라우저입니다.");
      const envelope = base64ToBytes(input);
      const magic = String.fromCharCode(...envelope.subarray(0, ENCRYPTED_MAGIC.length));
      if (magic !== ENCRYPTED_MAGIC) throw new Error("암호화된 데이터 형식이 아닙니다.");
      const saltStart = ENCRYPTED_MAGIC.length;
      const ivStart = saltStart + ENCRYPTED_SALT_BYTES;
      const dataStart = ivStart + ENCRYPTED_IV_BYTES;
      if (envelope.length <= dataStart + 16) throw new Error("암호화된 데이터가 손상되었습니다.");
      const passwordBytes = new TextEncoder().encode(password);
      const keyMaterial = await crypto.subtle.importKey("raw", passwordBytes, "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: envelope.subarray(saltStart, ivStart), iterations: ENCRYPTED_PBKDF2_ITERATIONS, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
      try {
        return new Uint8Array(await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: envelope.subarray(ivStart, dataStart) },
          key,
          envelope.subarray(dataStart)
        ));
      } catch (_) {
        throw new Error("비밀번호가 틀렸거나 데이터가 손상되었습니다.");
      }
    }
    async function decodePayload(input, password) {
      const compressed = await decryptPayload(input, password);
      const json = fflate.strFromU8(fflate.gunzipSync(compressed));
      return unpackData(JSON.parse(json));
    }
    let appStarted = false;
    function startApp(data) {
      if (appStarted) return;
      DATA = data;
      ALL = DATA.locations || [];
      NAVER_PLACES = DATA.naverLocations || [];
      naverLoaded = true;
      INSTALLED_MERCHANTS = DATA.installedMerchants || deriveInstalledMerchants(ALL);
      document.getElementById("data-loader").classList.add("hidden");
      appStarted = true;
      setupSearch();
      if (init()) { setupLocate(); setupChipToggles(); setupModeTabs(); }
    }
    function setupDataLoader() {
      const passwordInput = document.getElementById("data-password");
      const button = document.getElementById("data-load");
      const status = document.getElementById("data-status");
      function setBusy(isBusy) {
        button.disabled = isBusy;
        passwordInput.disabled = isBusy;
        status.textContent = isBusy ? "불러오는 중..." : "";
      }
      function looksLikePayload(text) {
        const payload = extractPayload(text);
        return payload.length > 1000 && /^[A-Za-z0-9_-]+$/.test(payload);
      }
      async function loadPayload(raw) {
        if (appStarted) return;
        const password = passwordInput.value;
        if (!password) {
          status.textContent = "비밀번호를 입력하세요.";
          passwordInput.focus();
          return;
        }
        if (!raw.trim()) {
          status.textContent = "클립보드에 데이터가 없습니다.";
          return;
        }
        setBusy(true);
        await new Promise(resolve => setTimeout(resolve, 20));
        try { startApp(await decodePayload(raw, password)); }
        catch (error) {
          button.disabled = false;
          passwordInput.disabled = false;
          status.textContent = error && error.message ? error.message : "데이터를 읽을 수 없습니다.";
        }
      }
      async function loadFromClipboard() {
        if (appStarted) return;
        if (!passwordInput.value) {
          status.textContent = "비밀번호를 입력하세요.";
          passwordInput.focus();
          return;
        }
        if (!navigator.clipboard || !navigator.clipboard.readText) {
          status.textContent = "클립보드 읽기를 사용할 수 없습니다.";
          return;
        }
        setBusy(true);
        try {
          const text = await navigator.clipboard.readText();
          if (!looksLikePayload(text)) {
            button.disabled = false;
            passwordInput.disabled = false;
            status.textContent = "클립보드에 데이터가 없습니다.";
            return;
          }
          await loadPayload(text);
        } catch (_) {
          button.disabled = false;
          passwordInput.disabled = false;
          status.textContent = "브라우저가 클립보드 읽기를 막았습니다.";
        }
      }
      button.addEventListener("click", loadFromClipboard);
      passwordInput.addEventListener("keydown", event => {
        if (event.key === "Enter") loadFromClipboard();
      });
      const urlPayload = new URLSearchParams(location.search).get("d") || new URLSearchParams(location.hash.replace(/^#/, "")).get("d");
      if (urlPayload) loadPayload(urlPayload);
      else passwordInput.focus();
    }

    function deriveInstalledMerchants(locations) {
      return locations.map(loc => {
        const installedAttempt = (loc.attempts || []).find(a =>
          (a.installStatus || "").toString().toUpperCase() === "Y"
        );
        if (!installedAttempt || !Number.isFinite(loc.lat) || !Number.isFinite(loc.lng)) return null;
        return {
          id: loc.bizNumber || loc.id || "",
          name: loc.store || loc.address || "",
          address: loc.address || "",
          lat: loc.lat,
          lng: loc.lng,
          installedDate: installedAttempt.installDate || installedAttempt.date || "",
          type: installedAttempt.installCombo || installedAttempt.installType || ""
        };
      }).filter(Boolean);
    }
    let INSTALLED_LAYER;                           
    let MAP, LAYER;
    let NAVER_LAYER;            
    let installedOnly = false;  
    let daewonOnly = false;     
    let merchantsVisible = !window.matchMedia("(max-width: 600px)").matches;
    let installedLayerRendered = false;
    let MODE = "history";        

    
    const LABEL_PRIORITY = ["미쉐린", "블루리본", "백년가게", "착한가격업소", "Npay"];
    const LABEL_ICONS = {
      "Npay": { html: 'N', cls: 'npay' },
      "착한가격업소": { html: '💵', cls: '' },
      "블루리본": { html: '🎗', cls: '' },
      "백년가게": { html: '💯', cls: '' },
      "미쉐린": { html: '🛞', cls: '' }
    };
    function pickLabel(labelsStr) {
      const arr = (labelsStr || "").split(",").map(s => s.trim()).filter(Boolean);
      for (const p of LABEL_PRIORITY) if (arr.includes(p)) return p;
      return arr[0] || null;
    }

    function init() {
      buildFilters(DATA.facets || {});
      if (!window.L || !L.markerClusterGroup) {
        document.getElementById("count").textContent = "지도 로드 실패";
        console.error("Leaflet failed to initialize.");
        return false;
      }
      
      
      let center = [37.5665, 126.978];
      if (ALL.length) {
        const lat = ALL.reduce((s, l) => s + l.lat, 0) / ALL.length;
        const lng = ALL.reduce((s, l) => s + l.lng, 0) / ALL.length;
        center = [lat, lng];
      }
      MAP = L.map("map", {
        zoomControl: false,
        preferCanvas: true   
      }).setView(center, 13);
      L.control.zoom({position: "topright"}).addTo(MAP);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
      }).addTo(MAP);
      
      const clusterOpts = {
        maxClusterRadius: 60,
        disableClusteringAtZoom: 15,  
        showCoverageOnHover: false,
        chunkedLoading: true,         
        chunkInterval: 100
      };
      
      INSTALLED_LAYER = L.markerClusterGroup(clusterOpts);
      if (merchantsVisible) INSTALLED_LAYER.addTo(MAP);
      LAYER = L.markerClusterGroup(clusterOpts).addTo(MAP);            
      NAVER_LAYER = L.markerClusterGroup(clusterOpts).addTo(MAP);      

      render(ALL);
      renderNaverLayer();

      
      if (merchantsVisible) setTimeout(loadInstalledMerchants, 300);
      return true;
    }

    function loadInstalledMerchants() {
      if (installedLayerRendered) return;
      renderInstalledLayer();
      installedLayerRendered = true;
      console.log("설치 매장 로드(정적):", INSTALLED_MERCHANTS.length);
    }

    function renderInstalledLayer() {
      INSTALLED_LAYER.clearLayers();
      
      const markers = INSTALLED_MERCHANTS.map(m => {
        const marker = L.circleMarker([m.lat, m.lng], {
          radius: 6,
          fillColor: "#fff",
          fillOpacity: 1,
          color: "#222",
          weight: 1.2,
          interactive: true
        });
        marker.bindTooltip(m.name);
        marker.on("click", () => renderInstalledSheet(m));
        return marker;
      });
      INSTALLED_LAYER.addLayers(markers);  
    }

    function renderInstalledSheet(m) {
      const body = document.getElementById("sheet-body");
      const fields = [];
      if (m.installedDate) fields.push(`<dt>설치일</dt><dd>${esc(m.installedDate)}</dd>`);
      if (m.type) fields.push(`<dt>연결 타입</dt><dd>${esc(m.type)}</dd>`);
      if (m.id) fields.push(`<dt>가맹점 ID</dt><dd>${esc(m.id)}</dd>`);
      body.innerHTML = `
        <div class="sheet-title">${esc(m.name) || "(매장명 없음)"}</div>
        <div class="sheet-addr">${esc(m.address)}</div>
        <div class="install-detail">
          <div class="install-detail-title">★ 설치 완료 매장</div>
          ${fields.length ? `<dl>${fields.join("")}</dl>` : ""}
        </div>
      `;
      document.getElementById("sheet").classList.remove("hidden");
      document.getElementById("sheet-backdrop").classList.remove("hidden");
    }

    function buildFilters(f) {
      fill("filter-rep", f.reps);
      fill("filter-region", f.regions);
      fill("filter-persuaded", f.persuasions);
      ["filter-rep", "filter-region", "filter-persuaded"].forEach(id =>
        document.getElementById(id).addEventListener("change", applyFilters)
      );
    }

    function fill(id, vs) {
      if (!vs) return;
      const sel = document.getElementById(id);
      vs.forEach(v => {
        const o = document.createElement("option");
        o.value = v; o.textContent = v;
        sel.appendChild(o);
      });
    }

    function applyFilters() {
      const rep = document.getElementById("filter-rep").value;
      const region = document.getElementById("filter-region").value;
      const persuaded = document.getElementById("filter-persuaded").value;
      const f = ALL.filter(loc => {
        const latest = loc.attempts[0] || {};
        if (installedOnly && (latest.installStatus || "").toString().toUpperCase() !== "Y") return false;
        if (daewonOnly && !loc.attempts.some(a => (a.agency || "").includes("대원하이텍"))) return false;
        if (region && loc.region !== region) return false;
        if (persuaded && latest.persuaded !== persuaded) return false;
        if (rep && !loc.attempts.some(a => a.rep === rep)) return false;
        return true;
      });
      render(f);
    }

    function pinIcon(loc) {
      const visits = loc.attempts.length;
      const hex = PIN_COLORS[loc.color] || PIN_COLORS.blue;
      const latestInstall = (loc.attempts[0] ? loc.attempts[0].installStatus : "").toString().toUpperCase();
      const isInstalled = latestInstall === "Y";
      const badge = visits >= 2 ? `<span class="pin-badge">${visits}</span>` : "";

      if (isInstalled) {
        
        const starHtml = `<svg class="pin-star" viewBox="0 0 24 24" width="20" height="20">
          <path d="M12 2 L14.59 8.45 L21.5 9.27 L16.25 13.97 L17.77 20.5 L12 17.27 L6.23 20.5 L7.75 13.97 L2.5 9.27 L9.41 8.45 Z"
                fill="${hex}" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>`;
        return L.divIcon({
          className: "pin-marker",
          html: starHtml + badge,
          iconSize: [20, 20],
          iconAnchor: [10, 10]
        });
      }

      // 일반: 동그라미
      return L.divIcon({
        className: "pin-marker",
        html: `<div class="pin-dot" style="background:${hex}"></div>${badge}`,
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });
    }

    function render(locs) {
      LAYER.clearLayers();
      if (MODE !== "history") return;
      locs.forEach(loc => {
        const m = L.marker([loc.lat, loc.lng], {icon: pinIcon(loc)});
        m.bindTooltip(loc.store || loc.address);
        m.on("click", () => onMarkerClick(loc));
        m.addTo(LAYER);
      });
      document.getElementById("count").textContent = locs.length + "개";
    }

    function targetPinIcon(p) {
      // 매칭됨 → 영업 히스토리 스타일(설치완료=별, 그외=동그라미 + 설득 색)
      if (p.matched) {
        const hex = PIN_COLORS[p.matched.color] || PIN_COLORS.blue;
        if (p.matched.isInstalled) {
          const starHtml = `<svg class="pin-star" viewBox="0 0 24 24" width="20" height="20">
            <path d="M12 2 L14.59 8.45 L21.5 9.27 L16.25 13.97 L17.77 20.5 L12 17.27 L6.23 20.5 L7.75 13.97 L2.5 9.27 L9.41 8.45 Z"
                  fill="${hex}" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>`;
          return L.divIcon({className: "pin-marker", html: starHtml, iconSize: [20, 20], iconAnchor: [10, 10]});
        }
        return L.divIcon({
          className: "pin-marker",
          html: `<div class="pin-dot" style="background:${hex}"></div>`,
          iconSize: [14, 14], iconAnchor: [7, 7]
        });
      }
      
      const lbl = pickLabel(p.labels);
      const conf = LABEL_ICONS[lbl] || { html: '📍', cls: '' };
      return L.divIcon({
        className: "pin-marker",
        html: `<div class="pin-label ${conf.cls}">${conf.html}</div>`,
        iconSize: [22, 22], iconAnchor: [11, 11]
      });
    }

    function getTargetFiltered() {
      const labelFilter = document.getElementById("filter-label").value;
      if (!labelFilter) return NAVER_PLACES;
      return NAVER_PLACES.filter(p => {
        const labels = (p.labels || "").split(",").map(s => s.trim());
        return labels.includes(labelFilter);
      });
    }

    function renderNaverLayer() {
      NAVER_LAYER.clearLayers();
      if (MODE !== "target") return;
      const places = getTargetFiltered();
      places.forEach(p => {
        const m = L.marker([p.lat, p.lng], {icon: targetPinIcon(p), zIndexOffset: -50});
        m.bindTooltip(p.name);
        m.on("click", () => renderTargetSheet(p));
        m.addTo(NAVER_LAYER);
      });
      document.getElementById("count").textContent = places.length + "개 타깃";
    }

    // 타깃 핀 클릭 → 바텀시트
    function renderTargetSheet(p) {
      const body = document.getElementById("sheet-body");
      const labels = (p.labels || "").split(",").map(s => s.trim()).filter(Boolean);
      const labelBadges = labels.map(l => `<span class="badge">${esc(l)}</span>`).join("");
      const matched = p.matched ? `
        <div class="sheet-empty" style="background:#e8f5e9;color:#1e8e3e;text-align:left">
          <strong>✓ 영업 히스토리 있음</strong>
          ${p.matched.store ? `<div class="sub" style="color:#1e8e3e;opacity:.85">매장명: ${esc(p.matched.store)}</div>` : ""}
          ${p.matched.isInstalled ? `<div class="sub" style="color:#1e8e3e;opacity:.85">설치 완료 ★</div>` : ""}
        </div>
      ` : "";
      body.innerHTML = `
        <div class="sheet-title">${esc(p.name) || "(매장명 없음)"}</div>
        <div class="sheet-addr">${esc(p.address)}</div>
        ${p.category ? `<div class="sheet-biz">카테고리 — ${esc(p.category)}</div>` : ""}
        ${labels.length ? `<div class="attempt-meta" style="margin-bottom:14px">${labelBadges}</div>` : ""}
        ${matched}
      `;
      document.getElementById("sheet").classList.remove("hidden");
      document.getElementById("sheet-backdrop").classList.remove("hidden");
    }

    // 마커 클릭 → 바텀시트 상세
    function onMarkerClick(loc) {
      renderSheet(loc);
    }

    function renderSheet(loc) {
      const body = document.getElementById("sheet-body");
      const colorClass = s => s === "설치완료" ? "green" : s === "재영업필요" ? "red" : "";
      const rows = loc.attempts.map(a => {
        const badges = [];
        if (a.installStatus) badges.push(`<span class="badge ${colorClass(a.installStatus)}">${esc(a.installStatus)}</span>`);
        if (a.persuaded) badges.push(`<span>설득:${esc(a.persuaded)}</span>`);
        if (a.installType) badges.push(`<span>${esc(a.installType)}</span>`);
        if (a.installDate) badges.push(`<span>설치일:${esc(a.installDate)}</span>`);
        if (a.installCombo) badges.push(`<span>조합:${esc(a.installCombo)}</span>`);
        if (a.result1) badges.push(`<span>1차:${esc(a.result1)}</span>`);
        if (a.result2) badges.push(`<span>2차:${esc(a.result2)}</span>`);
        if (a.result3) badges.push(`<span>3차:${esc(a.result3)}</span>`);
        if (a.negativeType) badges.push(`<span>부정:${esc(a.negativeType)}</span>`);

        // 대리점명 + 전화번호 (별도 줄, 전화는 tel: 링크로)
        let agencyLine = "";
        if (a.agency || a.phone) {
          const agencyPart = a.agency ? `<span>${esc(a.agency)}</span>` : "";
          const telDigits = (a.phone || "").replace(/[^\d+]/g, "");
          const telPart = a.phone
            ? `<a class="tel" href="tel:${telDigits}">📞 ${esc(a.phone)}</a>`
            : "";
          agencyLine = `<div class="attempt-agency">${agencyPart}${telPart}</div>`;
        }

        return `
          <div class="attempt">
            <div class="attempt-date">${esc(a.date) || "-"}</div>
            <div class="attempt-body">
              <div class="attempt-rep">${esc(a.rep) || "-"}</div>
              ${agencyLine}
              ${badges.length ? `<div class="attempt-meta">${badges.join("")}</div>` : ""}
              ${a.note ? `<div class="attempt-note">${esc(a.note)}</div>` : ""}
            </div>
          </div>
        `;
      }).join("");
      
      const installedAttempt = loc.attempts.find(a =>
        (a.installStatus || "").toString().toUpperCase() === "Y"
      );
      let installSection = "";
      if (installedAttempt) {
        const fields = [];
        if (installedAttempt.installDate) fields.push(`<dt>설치일</dt><dd>${esc(installedAttempt.installDate)}</dd>`);
        if (installedAttempt.installCombo) fields.push(`<dt>설치 조합</dt><dd>${esc(installedAttempt.installCombo)}</dd>`);
        if (installedAttempt.agency) fields.push(`<dt>설치 대리점</dt><dd>${esc(installedAttempt.agency)}</dd>`);
        if (installedAttempt.installType) fields.push(`<dt>설치 주체</dt><dd>${esc(installedAttempt.installType)}</dd>`);
        if (installedAttempt.date) fields.push(`<dt>컨택일</dt><dd>${esc(installedAttempt.date)}</dd>`);
        installSection = `
          <div class="install-detail">
            <div class="install-detail-title">★ 설치 완료 매장</div>
            ${fields.length ? `<dl>${fields.join("")}</dl>` : ""}
          </div>
        `;
      }
      body.innerHTML = `
        <div class="sheet-title">${esc(loc.store) || "(매장명 없음)"}</div>
        <div class="sheet-addr">${esc(loc.address)}</div>
        ${loc.bizNumber ? `<div class="sheet-biz">사업자등록번호: ${esc(loc.bizNumber)}</div>` : ""}
        ${installSection}
        <div class="attempts">${rows}</div>
      `;
      document.getElementById("sheet").classList.remove("hidden");
      document.getElementById("sheet-backdrop").classList.remove("hidden");
    }

    function closeSheet() {
      document.getElementById("sheet").classList.add("hidden");
      document.getElementById("sheet-backdrop").classList.add("hidden");
    }

    // 외부 주소 (DB에 없는 매장) 클릭 시 빈 히스토리 시트
    function renderEmptySheet(addr) {
      const body = document.getElementById("sheet-body");
      const title = addr.roadAddress || addr.jibunAddress || "주소";
      const sub = (addr.jibunAddress && addr.jibunAddress !== title) ? addr.jibunAddress : "";
      body.innerHTML = `
        <div class="sheet-title">${esc(title)}</div>
        ${sub ? `<div class="sheet-addr">${esc(sub)}</div>` : ""}
        <div class="sheet-empty">
          영업 히스토리가 없는 매장입니다.
          <div class="sub">시트에 영업시도가 등록되면 여기에 표시됩니다.</div>
        </div>
      `;
      document.getElementById("sheet").classList.remove("hidden");
      document.getElementById("sheet-backdrop").classList.remove("hidden");
    }

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    document.getElementById("sheet-close").addEventListener("click", closeSheet);
    document.getElementById("sheet-backdrop").addEventListener("click", closeSheet);

    

    async function searchExternalAddress(q) {
      const url = "https://nominatim.openstreetmap.org/search?" + new URLSearchParams({
        format: "jsonv2",
        q,
        limit: "5",
        countrycodes: "kr",
        addressdetails: "1",
        "accept-language": "ko"
      }).toString();
      const response = await fetch(url, { headers: { Accept: "application/json" } });
      if (!response.ok) throw new Error("Address search failed: " + response.status);
      const items = await response.json();
      return items.map(item => ({
        roadAddress: item.display_name || "",
        jibunAddress: "",
        lat: Number(item.lat),
        lng: Number(item.lon)
      })).filter(item => Number.isFinite(item.lat) && Number.isFinite(item.lng));
    }

    function setupSearch() {
      const input = document.getElementById("search");
      const clear = document.getElementById("search-clear");
      const results = document.getElementById("search-results");
      let debounceTimer = null;
      let currentLocal = [];
      let currentExternal = null; 
      let lastQuery = "";

      function paint() {
        let html = "";
        if (currentLocal.length) {
          html += `<div class="search-section-label">등록된 매장</div>`;
          html += currentLocal.map((loc, i) => `
            <div class="search-result store-result" data-idx="${i}">
              <div class="name">${esc(loc.store || "(매장명 없음)")}</div>
              <div class="addr">${esc(loc.address)}</div>
            </div>
          `).join("");
        }
        if (currentExternal === null) {
          html += `<div class="search-section-label">외부 주소 <span class="loading-text">검색중...</span></div>`;
        } else if (currentExternal.length) {
          html += `<div class="search-section-label">외부 주소 · 영업 히스토리 없음</div>`;
          html += currentExternal.map((addr, i) => `
            <div class="search-result addr-result" data-aidx="${i}">
              <div class="name">${esc(addr.roadAddress || addr.jibunAddress || "주소")}</div>
              ${addr.jibunAddress && addr.jibunAddress !== addr.roadAddress
                ? `<div class="addr">${esc(addr.jibunAddress)}</div>` : ""}
            </div>
          `).join("");
        }
        if (!currentLocal.length && currentExternal !== null && !currentExternal.length) {
          html = `<div class="search-empty">결과 없음</div>`;
        }
        results.innerHTML = html;

        // 클릭 핸들러 — 등록 매장
        results.querySelectorAll(".store-result").forEach(el => {
          const i = parseInt(el.dataset.idx, 10);
          el.addEventListener("click", () => {
            const loc = currentLocal[i];
            MAP.flyTo([loc.lat, loc.lng], 16, {duration: 0.6});
            renderSheet(loc);
            results.classList.add("hidden");
            input.value = loc.store || loc.address;
            input.blur();
          });
        });
        
        results.querySelectorAll(".addr-result").forEach(el => {
          const i = parseInt(el.dataset.aidx, 10);
          el.addEventListener("click", () => {
            const addr = (currentExternal || [])[i];
            if (!addr) return;
            MAP.flyTo([addr.lat, addr.lng], 16, {duration: 0.6});
            renderEmptySheet(addr);
            results.classList.add("hidden");
            input.value = addr.roadAddress || addr.jibunAddress || "";
            input.blur();
          });
        });
      }

      function runSearch() {
        const q = input.value.trim();
        if (!q) {
          results.classList.add("hidden");
          clear.classList.add("hidden");
          if (debounceTimer) clearTimeout(debounceTimer);
          return;
        }
        clear.classList.remove("hidden");
        lastQuery = q;

        
        const ql = q.toLowerCase();
        currentLocal = ALL.filter(loc =>
          (loc.store || "").toLowerCase().includes(ql) ||
          (loc.address || "").toLowerCase().includes(ql)
        ).slice(0, 8);

        
        currentExternal = null; 
        paint();
        results.classList.remove("hidden");

        if (debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          const qSnapshot = q;
          searchExternalAddress(qSnapshot)
            .then(addrs => {
              if (qSnapshot !== lastQuery) return;
              currentExternal = addrs || [];
              paint();
            })
            .catch(() => {
              if (qSnapshot !== lastQuery) return;
              currentExternal = [];
              paint();
            });
        }, 350);
      }

      input.addEventListener("input", runSearch);
      input.addEventListener("focus", () => { if (input.value.trim()) runSearch(); });

      clear.addEventListener("click", () => {
        input.value = "";
        results.classList.add("hidden");
        clear.classList.add("hidden");
        if (debounceTimer) clearTimeout(debounceTimer);
        input.focus();
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".search-wrap")) {
          results.classList.add("hidden");
        }
      });
    }

    
    function setupLocate() {
      const btn = document.getElementById("locate-btn");
      const RADIUS_M = 500;  
      let userMarker = null;
      let accuracyCircle = null;
      let radiusCircle = null;

      
      function distance(lat1, lng1, lat2, lng2) {
        const R = 6371e3;
        const toRad = x => x * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLng = toRad(lng2 - lng1);
        const a = Math.sin(dLat/2) ** 2 +
                  Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2) ** 2;
        return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      }

      MAP.on("locationfound", (e) => {
        btn.classList.remove("loading");
        if (userMarker) MAP.removeLayer(userMarker);
        if (accuracyCircle) MAP.removeLayer(accuracyCircle);
        if (radiusCircle) MAP.removeLayer(radiusCircle);

        
        accuracyCircle = L.circle(e.latlng, {
          radius: e.accuracy, color: "#1a73e8", fillColor: "#1a73e8",
          fillOpacity: 0.08, weight: 1
        }).addTo(MAP);

        
        radiusCircle = L.circle(e.latlng, {
          radius: RADIUS_M, color: "#1a73e8", fillColor: "#1a73e8",
          fillOpacity: 0.04, weight: 1.5, dashArray: "6, 6"
        }).addTo(MAP);

        
        const nearby = ALL.filter(loc =>
          distance(loc.lat, loc.lng, e.latlng.lat, e.latlng.lng) <= RADIUS_M
        ).length;

        userMarker = L.circleMarker(e.latlng, {
          radius: 8, fillColor: "#1a73e8", fillOpacity: 1,
          color: "#fff", weight: 3
        }).addTo(MAP);
        userMarker.bindTooltip(`내 위치 · 500m 내 ${nearby}개`, {
          permanent: true, direction: "top", offset: [0, -10],
          className: "locate-tooltip"
        });

        
        MAP.flyToBounds(radiusCircle.getBounds(), {duration: 0.6, padding: [50, 50]});
      });

      MAP.on("locationerror", (e) => {
        btn.classList.remove("loading");
        alert("현위치를 가져올 수 없어요.\n원인: " + e.message + "\n\n폰 브라우저에서 위치 권한을 허용했는지 확인해주세요.");
      });

      btn.addEventListener("click", () => {
        btn.classList.add("loading");
        MAP.locate({timeout: 10000, enableHighAccuracy: true, maximumAge: 30000});
      });
    }

    
    function setupChipToggles() {
      const installedBtn = document.getElementById("installed-toggle");
      installedBtn.addEventListener("click", () => {
        installedOnly = !installedOnly;
        installedBtn.classList.toggle("active", installedOnly);
        applyFilters();
      });
      const daewonBtn = document.getElementById("agency-daewon");
      daewonBtn.addEventListener("click", () => {
        daewonOnly = !daewonOnly;
        daewonBtn.classList.toggle("active", daewonOnly);
        applyFilters();
      });
      const merchantsBtn = document.getElementById("merchants-toggle");
      merchantsBtn.classList.toggle("active", merchantsVisible);
      merchantsBtn.addEventListener("click", () => {
        merchantsVisible = !merchantsVisible;
        merchantsBtn.classList.toggle("active", merchantsVisible);
        if (merchantsVisible) {
          if (!MAP.hasLayer(INSTALLED_LAYER)) MAP.addLayer(INSTALLED_LAYER);
          loadInstalledMerchants();
        } else {
          MAP.removeLayer(INSTALLED_LAYER);
        }
      });
    }

    
    function populateLabelFilter() {
      const sel = document.getElementById("filter-label");
      
      if (sel.options.length > 1) return;
      const set = new Set();
      NAVER_PLACES.forEach(p => {
        (p.labels || "").split(",").map(s => s.trim()).filter(Boolean).forEach(l => set.add(l));
      });
      
      const priority = ["미쉐린", "블루리본", "백년가게", "착한가격업소", "Npay"];
      const labels = [...set].sort((a, b) => {
        const ai = priority.indexOf(a); const bi = priority.indexOf(b);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
      });
      labels.forEach(l => {
        const o = document.createElement("option");
        o.value = l; o.textContent = l;
        sel.appendChild(o);
      });
      sel.addEventListener("change", renderNaverLayer);
    }

    
    function setupModeTabs() {
      document.body.dataset.mode = MODE;  
      document.querySelectorAll(".mode-tab").forEach(btn => {
        btn.addEventListener("click", () => {
          MODE = btn.dataset.mode;
          document.body.dataset.mode = MODE;
          document.querySelectorAll(".mode-tab").forEach(b =>
            b.classList.toggle("active", b.dataset.mode === MODE)
          );
          if (MODE === "history") {
            applyFilters();
            NAVER_LAYER.clearLayers();
          } else {
            LAYER.clearLayers();
            naverLoaded = true;
            populateLabelFilter();
            renderNaverLayer();
          }
        });
      });
    }

    setupDataLoader();
  </script>
